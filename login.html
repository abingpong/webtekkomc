<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Tekkom C</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* Animated Gradient Background */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f8fafc;
overflow:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Glow Circle */

body::before{
content:'';
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#e0e7ff,transparent);
top:-200px;
right:-200px;
opacity:0.6;
}

/* Glass Card */

.login-card{
width:420px;
background:white;
border-radius:18px;
padding:45px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
border:1px solid #e5e7eb;
color:#111827;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Title */

.login-header{
text-align:center;
margin-bottom:35px;
}

.login-header h2{
font-size:28px;
font-weight:800;
}

.login-header p{
font-size:13px;
opacity:0.8;
}

/* Floating Inputs */

.input-group{
position:relative;
margin-bottom:24px;
}

/* Input */

.input-group input{
width:100%;
padding:14px 14px;
border-radius:10px;
border:1px solid #e5e7eb;
background:white;
color:#111827;
font-size:14px;
outline:none;
transition:all 0.25s ease;
}

/* Focus effect */

.input-group input:focus{
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

/* Label */

.input-group label{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:13px;
color:#6b7280;
background:white;
padding:0 6px;
pointer-events:none;
transition:all 0.25s ease;
}

/* Floating effect */

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{

top:-8px;
transform:none;
font-size:11px;
color:#6366f1;

}

/* Button */

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:700;
font-size:14px;
cursor:pointer;
background:#6366f1;
color:white;
transition:0.25s;
}

.login-btn:hover{
background:#4f46e5;
transform:translateY(-1px);
}


/* Loading */

.login-btn.loading{
pointer-events:none;
opacity:0.8;
}

.login-btn.loading i{
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
/* ============================= */
/* RESPONSIVE MOBILE */
/* ============================= */

@media (max-width:480px){

body{
padding:20px;
}

.login-card{
width:100%;
max-width:360px;
padding:30px 22px;
border-radius:18px;
}

.login-header h2{
font-size:22px;
}

.input-group input{
padding:12px;
font-size:14px;
}

.login-btn{
padding:12px;
font-size:14px;
}

.login-footer{
font-size:11px;
}

}

@media (max-width:360px){

.login-card{
padding:26px 18px;
}

.login-header h2{
font-size:20px;
}

}

@media (max-width:480px){

body::before{
width:300px;
height:300px;
top:-100px;
left:-100px;
}

}
/* Footer */
.input-group input:hover{
border-color:#c7d2fe;
}

.login-footer{
text-align:center;
margin-top:18px;
font-size:12px;
opacity:0.8;
}

</style>

</head>
<body>

<div class="login-card">

<div class="login-header">
<h2>Portal Tekkom C</h2>
<p>Politeknik Elektronika Negeri Surabaya</p>
</div>

<form id="loginForm">

<div class="input-group">
<input type="text" id="nrpInput" placeholder=" " required>
<label>NRP Mahasiswa</label>
</div>

<div class="input-group">
<input type="password" id="passwordInput" placeholder=" " required>
<label>Password</label>
</div>

<button id="loginBtn" class="login-btn" type="submit">
<i class='bx bx-log-in'></i>
<span id="btnText">Masuk Portal</span>
</button>

</form>

<div class="login-footer">
Gunakan <b>NRP</b> sebagai username dan password
</div>

</div>

<script src="login.js"></script>

</body>
</html>
